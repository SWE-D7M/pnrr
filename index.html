<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Background</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
width: 1920px;
height: 1080px;
background: #020008;
overflow: hidden;
font-family: ‘Courier New’, monospace;
}

/* === GRID FLOOR === */
.grid {
position: absolute;
bottom: 0;
left: 0;
width: 100%;
height: 55%;
background-image:
linear-gradient(rgba(0,255,180,0.15) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,180,0.15) 1px, transparent 1px);
background-size: 80px 80px;
transform: perspective(600px) rotateX(55deg);
transform-origin: bottom center;
animation: gridPulse 4s ease-in-out infinite;
}

@keyframes gridPulse {
0%, 100% { opacity: 0.6; }
50% { opacity: 1; }
}

/* === HORIZON GLOW === */
.horizon {
position: absolute;
bottom: 42%;
left: 0;
width: 100%;
height: 3px;
background: linear-gradient(90deg, transparent, #00ffb4, #ff00ff, #00ffb4, transparent);
box-shadow: 0 0 30px #00ffb4, 0 0 80px #ff00ff, 0 0 120px #00ffb4;
animation: horizonGlow 3s ease-in-out infinite;
}

@keyframes horizonGlow {
0%, 100% { opacity: 0.7; box-shadow: 0 0 30px #00ffb4, 0 0 80px #ff00ff; }
50% { opacity: 1; box-shadow: 0 0 60px #00ffb4, 0 0 140px #ff00ff, 0 0 200px #00aaff; }
}

/* === TOP SCAN LINE === */
.scanline {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
background: repeating-linear-gradient(
0deg,
transparent,
transparent 3px,
rgba(0,255,180,0.015) 3px,
rgba(0,255,180,0.015) 4px
);
pointer-events: none;
z-index: 10;
}

/* === STARS === */
.stars {
position: absolute;
top: 0; left: 0;
width: 100%; height: 55%;
overflow: hidden;
}

.star {
position: absolute;
background: white;
border-radius: 50%;
animation: twinkle linear infinite;
}

@keyframes twinkle {
0%, 100% { opacity: 0.2; transform: scale(1); }
50% { opacity: 1; transform: scale(1.5); }
}

/* === FLOATING PARTICLES === */
.particle {
position: absolute;
border-radius: 50%;
animation: floatUp linear infinite;
pointer-events: none;
}

@keyframes floatUp {
0% { transform: translateY(0) translateX(0); opacity: 0; }
10% { opacity: 1; }
90% { opacity: 0.6; }
100% { transform: translateY(-900px) translateX(var(–drift)); opacity: 0; }
}

/* === NEON MOUNTAINS === */
.mountains {
position: absolute;
bottom: 42%;
left: 0;
width: 100%;
height: 250px;
}

/* === CORNER DECORATIONS === */
.corner {
position: absolute;
width: 120px;
height: 120px;
border-color: #00ffb4;
border-style: solid;
opacity: 0.6;
animation: cornerPulse 2.5s ease-in-out infinite;
}

.corner.tl { top: 30px; left: 30px; border-width: 3px 0 0 3px; }
.corner.tr { top: 30px; right: 30px; border-width: 3px 3px 0 0; }
.corner.bl { bottom: 30px; left: 30px; border-width: 0 0 3px 3px; }
.corner.br { bottom: 30px; right: 30px; border-width: 0 3px 3px 0; }

@keyframes cornerPulse {
0%, 100% { opacity: 0.4; border-color: #00ffb4; }
50% { opacity: 0.9; border-color: #ff00ff; box-shadow: 0 0 20px #ff00ff; }
}

/* === HUD LINES === */
.hud-line {
position: absolute;
background: linear-gradient(90deg, transparent, #00ffb4, transparent);
height: 1px;
opacity: 0;
animation: hudScan 6s ease-in-out infinite;
}

.hud-line:nth-child(1) { top: 20%; width: 200px; left: 60px; animation-delay: 0s; }
.hud-line:nth-child(2) { top: 25%; width: 120px; left: 60px; animation-delay: 0.3s; }
.hud-line:nth-child(3) { top: 20%; width: 200px; right: 60px; animation-delay: 1s; }
.hud-line:nth-child(4) { top: 25%; width: 120px; right: 60px; animation-delay: 1.3s; }

@keyframes hudScan {
0% { opacity: 0; }
20% { opacity: 0.8; }
80% { opacity: 0.8; }
100% { opacity: 0; }
}

/* === HUD DOTS === */
.hud-dot {
position: absolute;
width: 6px; height: 6px;
background: #00ffb4;
border-radius: 50%;
box-shadow: 0 0 10px #00ffb4;
animation: dotBlink 1.5s ease-in-out infinite;
}

.hud-dot:nth-child(5) { top: 19%; left: 58px; animation-delay: 0s; }
.hud-dot:nth-child(6) { top: 19%; right: 58px; animation-delay: 1s; }

@keyframes dotBlink {
0%, 100% { opacity: 0.3; }
50% { opacity: 1; }
}

/* === DATA STREAMS === */
.data-stream {
position: absolute;
top: 0;
font-size: 11px;
color: #00ffb4;
opacity: 0;
white-space: nowrap;
animation: dataFall linear infinite;
letter-spacing: 2px;
}

@keyframes dataFall {
0% { transform: translateY(-50px); opacity: 0; }
5% { opacity: 0.5; }
95% { opacity: 0.3; }
100% { transform: translateY(1130px); opacity: 0; }
}

/* === CENTER GLOW === */
.center-glow {
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
width: 600px; height: 300px;
background: radial-gradient(ellipse, rgba(255,0,255,0.06) 0%, transparent 70%);
animation: centerPulse 4s ease-in-out infinite;
}

@keyframes centerPulse {
0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
}

/* === VIGNETTE === */
.vignette {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
background: radial-gradient(ellipse at center, transparent 40%, rgba(2,0,8,0.85) 100%);
pointer-events: none;
z-index: 5;
}

/* === BOTTOM GLOW === */
.bottom-glow {
position: absolute;
bottom: 0; left: 0;
width: 100%; height: 200px;
background: linear-gradient(0deg, rgba(0,255,180,0.08), transparent);
}
</style>

</head>
<body>

<div class="grid"></div>
<div class="horizon"></div>
<div class="stars" id="stars"></div>
<canvas class="mountains" id="mountains"></canvas>
<div class="center-glow"></div>
<div class="bottom-glow"></div>
<div class="vignette"></div>
<div class="scanline"></div>

<!-- Corners -->

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- HUD -->

<div class="hud-line"></div>
<div class="hud-line"></div>
<div class="hud-line"></div>
<div class="hud-line"></div>
<div class="hud-dot"></div>
<div class="hud-dot"></div>

<div id="particles"></div>
<div id="dataStreams"></div>

<script>
  // === STARS ===
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 180; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    star.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      animation-duration:${2+Math.random()*4}s;
      animation-delay:${Math.random()*4}s;
    `;
    starsContainer.appendChild(star);
  }

  // === MOUNTAINS ===
  const canvas = document.getElementById('mountains');
  canvas.width = 1920;
  canvas.height = 250;
  const ctx = canvas.getContext('2d');

  function drawMountains() {
    ctx.clearRect(0, 0, 1920, 250);

    // Far mountains
    ctx.beginPath();
    ctx.moveTo(0, 250);
    const points1 = [
      [0,180],[150,90],[300,140],[500,60],[700,120],[900,40],[1100,100],[1300,55],[1500,110],[1700,70],[1920,130],[1920,250]
    ];
    points1.forEach(([x,y]) => ctx.lineTo(x,y));
    ctx.closePath();
    const g1 = ctx.createLinearGradient(0,0,0,250);
    g1.addColorStop(0,'rgba(255,0,255,0.25)');
    g1.addColorStop(1,'rgba(2,0,8,0.9)');
    ctx.fillStyle = g1;
    ctx.fill();

    // Outline glow far
    ctx.beginPath();
    points1.slice(0,-1).forEach(([x,y], i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
    ctx.strokeStyle = 'rgba(255,0,255,0.7)';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#ff00ff';
    ctx.shadowBlur = 15;
    ctx.stroke();

    // Near mountains
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(0, 250);
    const points2 = [
      [0,220],[200,130],[400,190],[600,100],[800,160],[1000,80],[1200,150],[1400,95],[1600,160],[1920,120],[1920,250]
    ];
    points2.forEach(([x,y]) => ctx.lineTo(x,y));
    ctx.closePath();
    const g2 = ctx.createLinearGradient(0,0,0,250);
    g2.addColorStop(0,'rgba(0,255,180,0.15)');
    g2.addColorStop(1,'rgba(2,0,8,0.95)');
    ctx.fillStyle = g2;
    ctx.fill();

    // Outline glow near
    ctx.beginPath();
    points2.slice(0,-1).forEach(([x,y], i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
    ctx.strokeStyle = 'rgba(0,255,180,0.9)';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00ffb4';
    ctx.shadowBlur = 20;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  drawMountains();

  // === PARTICLES ===
  const particlesContainer = document.getElementById('particles');
  const colors = ['#00ffb4','#ff00ff','#00aaff','#ffff00'];

  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const color = colors[Math.floor(Math.random()*colors.length)];
    const size = Math.random() * 4 + 1;
    const drift = (Math.random()-0.5)*200;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${color};
      box-shadow:0 0 ${size*3}px ${color};
      left:${Math.random()*100}%;
      bottom:${Math.random()*45}%;
      --drift:${drift}px;
      animation-duration:${5+Math.random()*10}s;
      animation-delay:${Math.random()*10}s;
    `;
    particlesContainer.appendChild(p);
  }

  // === DATA STREAMS ===
  const streamsContainer = document.getElementById('dataStreams');
  const chars = '01アイウエオカキクケコサシスセソ';

  for (let i = 0; i < 12; i++) {
    const stream = document.createElement('div');
    stream.className = 'data-stream';
    let text = '';
    for (let j = 0; j < Math.floor(Math.random()*15+5); j++) {
      text += chars[Math.floor(Math.random()*chars.length)] + ' ';
    }
    stream.textContent = text;
    stream.style.cssText = `
      left:${Math.random()*100}%;
      animation-duration:${8+Math.random()*12}s;
      animation-delay:${Math.random()*12}s;
      opacity:0;
      font-size:${Math.random()*5+8}px;
    `;
    streamsContainer.appendChild(stream);
  }
</script>

</body>
</html>
