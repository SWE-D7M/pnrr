<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gaming Background</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510}
#bg{width:1920px;height:1080px;background:#050510;overflow:hidden;position:relative}
canvas{position:absolute;top:0;left:0}
.scanlines{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none}
.vignette{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.75) 100%);pointer-events:none}
.corner-tl,.corner-tr,.corner-bl,.corner-br{position:absolute;width:60px;height:60px}
.corner-tl{top:14px;left:14px;border-top:2px solid rgba(0,255,136,0.7);border-left:2px solid rgba(0,255,136,0.7)}
.corner-tr{top:14px;right:14px;border-top:2px solid rgba(0,255,136,0.7);border-right:2px solid rgba(0,255,136,0.7)}
.corner-bl{bottom:14px;left:14px;border-bottom:2px solid rgba(0,255,136,0.7);border-left:2px solid rgba(0,255,136,0.7)}
.corner-br{bottom:14px;right:14px;border-bottom:2px solid rgba(0,255,136,0.7);border-right:2px solid rgba(0,255,136,0.7)}
.label{position:absolute;bottom:16px;right:20px;font-family:monospace;font-size:13px;color:rgba(0,255,136,0.35);letter-spacing:2px}
svg.hexgrid{position:absolute;top:0;left:0;width:1920px;height:1080px;opacity:0.06}
</style>
</head>
<body>
<div id="bg">
  <canvas id="c1" width="1920" height="1080"></canvas>
  <canvas id="c2" width="1920" height="1080"></canvas>
  <svg class="hexgrid" id="hexsvg" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>
  <div class="label">LIVE · 1080p</div>
</div>

<script>
const W=1920,H=1080;
const c1=document.getElementById('c1');
const c2=document.getElementById('c2');
const ctx1=c1.getContext('2d');
const ctx2=c2.getContext('2d');

(function(){
  const svg=document.getElementById('hexsvg');
  const r=60;
  const hex=(cx,cy,r)=>{let d='';for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);d+=(i===0?'M':'L')+(cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1);}return d+'Z';};
  let paths='';
  const rw=r*Math.sqrt(3),rh=r*1.5;
  for(let row=0;row<Math.ceil(H/rh)+2;row++){
    for(let col=0;col<Math.ceil(W/rw)+2;col++){
      const cx=col*rw+(row%2)*rw/2,cy=row*rh;
      paths+=`<path d="${hex(cx,cy,r*0.88)}" fill="none" stroke="#00ff88" stroke-width="0.8"/>`;
    }
  }
  svg.innerHTML=paths;
})();

const COLORS=['#00ff88','#00aaff','#ff3366','#ffcc00','#aa00ff'];
const particles=[];
function newP(){
  return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.7,vy:(Math.random()-0.5)*0.7,r:Math.random()*2.5+0.5,color:COLORS[Math.floor(Math.random()*COLORS.length)],alpha:Math.random()*0.7+0.3,life:Math.random()*300+150,age:Math.random()*200};
}
for(let i=0;i<260;i++) particles.push(newP());

const waves=[];
function spawnWave(){waves.push({x:Math.random()*W,y:Math.random()*H,r:0,alpha:0.5,color:Math.random()>0.5?'#00ff88':'#00aaff'});}
setInterval(spawnWave,2000);
spawnWave();spawnWave();spawnWave();

const scanLines=[];
for(let i=0;i<10;i++) scanLines.push({y:Math.random()*H,speed:(Math.random()*0.4+0.15)*(Math.random()>0.5?1:-1),alpha:Math.random()*0.25+0.1,color:COLORS[Math.floor(Math.random()*COLORS.length)]});

const stars=[];
for(let i=0;i<220;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.2,t:Math.random()*Math.PI*2,sp:Math.random()*0.04+0.01});

function hexToRgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}

function draw(){
  const grad=ctx1.createRadialGradient(W*0.3,H*0.4,0,W*0.5,H*0.5,W*0.9);
  grad.addColorStop(0,'#0d0d35');
  grad.addColorStop(0.5,'#060620');
  grad.addColorStop(1,'#020208');
  ctx1.fillStyle=grad;
  ctx1.fillRect(0,0,W,H);

  stars.forEach(s=>{s.t+=s.sp;const a=0.3+0.7*Math.abs(Math.sin(s.t));ctx1.beginPath();ctx1.arc(s.x,s.y,s.r,0,Math.PI*2);ctx1.fillStyle=`rgba(255,255,255,${a})`;ctx1.fill();});

  for(let i=waves.length-1;i>=0;i--){
    const wv=waves[i];wv.r+=2.5;wv.alpha-=0.005;
    if(wv.alpha<=0){waves.splice(i,1);continue;}
    const [r,g,b]=hexToRgb(wv.color);
    ctx1.beginPath();ctx1.arc(wv.x,wv.y,wv.r,0,Math.PI*2);
    ctx1.strokeStyle=`rgba(${r},${g},${b},${wv.alpha})`;ctx1.lineWidth=1.5;ctx1.stroke();
    if(wv.r>80){
      ctx1.beginPath();ctx1.arc(wv.x,wv.y,wv.r*0.7,0,Math.PI*2);
      ctx1.strokeStyle=`rgba(${r},${g},${b},${wv.alpha*0.4})`;ctx1.lineWidth=0.8;ctx1.stroke();
    }
  }

  scanLines.forEach(l=>{
    l.y+=l.speed;if(l.y<0)l.y=H;if(l.y>H)l.y=0;
    const [r,g,b]=hexToRgb(l.color);
    const lg=ctx1.createLinearGradient(0,0,W,0);
    lg.addColorStop(0,`rgba(${r},${g},${b},0)`);
    lg.addColorStop(0.5,`rgba(${r},${g},${b},${l.alpha})`);
    lg.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx1.beginPath();ctx1.moveTo(0,l.y);ctx1.lineTo(W,l.y);
    ctx1.strokeStyle=lg;ctx1.lineWidth=1;ctx1.stroke();
  });

  ctx2.clearRect(0,0,W,H);
  particles.forEach((p,i)=>{
    p.x+=p.vx;p.y+=p.vy;p.age++;
    if(p.x<0||p.x>W||p.y<0||p.y>H||p.age>p.life){particles[i]=newP();return;}
    const [r,g,b]=hexToRgb(p.color);
    const fade=1-p.age/p.life;
    ctx2.beginPath();ctx2.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx2.fillStyle=`rgba(${r},${g},${b},${p.alpha*fade})`;ctx2.fill();
    for(let j=i+1;j<particles.length;j++){
      const p2=particles[j];const dx=p.x-p2.x,dy=p.y-p2.y;const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<110){ctx2.beginPath();ctx2.moveTo(p.x,p.y);ctx2.lineTo(p2.x,p2.y);ctx2.strokeStyle=`rgba(${r},${g},${b},${(1-dist/110)*0.12*fade})`;ctx2.lineWidth=0.5;ctx2.stroke();}
    }
  });

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
